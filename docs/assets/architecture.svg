<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 880" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Layer 1: Comms -->
  <rect x="60" y="30" width="440" height="90" rx="14" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <text x="280" y="70" text-anchor="middle" font-size="26" font-weight="600" fill="#0f172a">Comms</text>
  <text x="280" y="98" text-anchor="middle" font-size="15" fill="#475569">Telegram  ·  Email  ·  LinkedIn  ·  …</text>

  <!-- arrow -->
  <line x1="280" y1="125" x2="280" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: Bridge -->
  <rect x="60" y="170" width="440" height="90" rx="14" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="280" y="210" text-anchor="middle" font-size="26" font-weight="600" fill="#0f172a">Bridge</text>
  <text x="280" y="238" text-anchor="middle" font-size="14" fill="#475569">I/O only — enqueues sessions, routes output</text>

  <!-- arrow with label -->
  <line x1="280" y1="265" x2="280" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="292" y="295" font-size="13" fill="#64748b">Redis queue</text>

  <!-- Layer 3: Worker container -->
  <rect x="30" y="325" width="500" height="365" rx="16" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="280" y="360" text-anchor="middle" font-size="26" font-weight="600" fill="#0f172a">Worker</text>
  <text x="280" y="385" text-anchor="middle" font-size="13" fill="#475569">sole session execution engine</text>

  <!-- PM session box -->
  <rect x="70" y="410" width="420" height="70" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="280" y="438" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">PM</text>
  <text x="280" y="462" text-anchor="middle" font-size="12" fill="#64748b">orchestrates the SDLC pipeline</text>

  <!-- connector PM -> Dev (spawn relationship) -->
  <line x1="280" y1="483" x2="280" y2="513" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="292" y="502" font-size="11" fill="#94a3b8" font-style="italic">spawns</text>

  <!-- Dev session box (indented to show child) -->
  <rect x="110" y="515" width="380" height="70" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="300" y="543" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Dev</text>
  <text x="300" y="567" text-anchor="middle" font-size="12" fill="#64748b">writes, tests, ships code</text>

  <!-- Teammate session box -->
  <rect x="70" y="605" width="420" height="70" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="280" y="633" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Teammate</text>
  <text x="280" y="657" text-anchor="middle" font-size="12" fill="#64748b">conversational</text>

  <!-- arrow Worker -> Harness -->
  <line x1="280" y1="695" x2="280" y2="735" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 4: Agent Harness -->
  <rect x="60" y="740" width="440" height="90" rx="14" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="280" y="780" text-anchor="middle" font-size="26" font-weight="600" fill="#0f172a">Agent Harness</text>
  <text x="280" y="808" text-anchor="middle" font-size="14" fill="#475569">Claude Code / Agent SDK  +  MCP tools</text>
</svg>
