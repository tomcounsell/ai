# Reflections Registry
#
# All recurring non-issue work is declared here. The reflection scheduler
# (agent/reflection_scheduler.py) reads this file and enqueues reflections
# when they're due.
#
# Fields:
#   name:           Unique identifier (used as Redis key)
#   interval:       How often to run (seconds). Use constants below for readability.
#   priority:       Job queue priority: urgent | high | normal | low
#   execution_type: "function" (direct Python callable) or "agent" (full Claude session)
#   callable:       Python dotted path to the function (for execution_type: function)
#   command:        Shell command to run (for execution_type: agent)
#   description:    Human-readable description
#   enabled:        Whether this reflection is active (default: true)
#
# Interval reference:
#   300    = 5 minutes
#   1800   = 30 minutes
#   3600   = 1 hour
#   86400  = 24 hours
#
# NOTE: Bridge watchdog is intentionally NOT in this registry.
# It must run as an external launchd service (com.valor.bridge-watchdog)
# because it monitors the bridge process itself -- it cannot run inside
# the process it monitors.

reflections:
  - name: health-check
    description: "Check running sessions for liveness and timeout, recover stuck ones"
    interval: 300  # 5 minutes
    priority: high
    execution_type: function
    callable: "agent.agent_session_queue._agent_session_health_check"
    enabled: true

  - name: agent-session-cleanup
    description: "Delete corrupted AgentSession records (invalid IDs, unsaveable) and rebuild indexes"
    interval: 3600  # 1 hour
    priority: normal
    execution_type: function
    callable: "agent.agent_session_queue.cleanup_corrupted_agent_sessions"
    enabled: true

  - name: stale-branch-cleanup
    description: "Clean up session branches older than 72 hours"
    interval: 86400  # daily
    priority: low
    execution_type: function
    callable: "agent.agent_session_queue.cleanup_stale_branches_all_projects"
    enabled: false

  - name: popoto-index-cleanup
    description: "Rebuild Popoto model indexes to clean orphaned entries from crashes/TTL expiry"
    interval: 86400  # daily
    priority: low
    # execution_type/callable: dispatched by ReflectionScheduler (agent/reflection_scheduler.py)
    # Also wired as step_popoto_index_cleanup in ReflectionRunner (scripts/reflections.py)
    # See docs/features/popoto-index-hygiene.md
    execution_type: function
    callable: "scripts.popoto_index_cleanup.run_cleanup"
    enabled: true

  # === Sustainable Self-Healing (issue #773) ===

  - name: api-health-gate
    description: "Check Anthropic circuit state; set/clear queue_paused flag to block/allow session dequeue"
    interval: 60  # 1 minute
    priority: high
    execution_type: function
    callable: "agent.sustainability.api_health_gate"
    enabled: true

  - name: session-count-throttle
    description: "Count sessions started in last hour; write throttle_level (none/moderate/suspended)"
    interval: 3600  # 1 hour
    priority: normal
    execution_type: function
    callable: "agent.sustainability.session_count_throttle"
    enabled: true

  - name: failure-loop-detector
    description: "Scan failed sessions for repeated error fingerprints; file one GitHub issue per novel cluster"
    interval: 3600  # 1 hour
    priority: normal
    execution_type: function
    callable: "agent.sustainability.failure_loop_detector"
    enabled: true

  - name: recovery-drip
    description: "Drip one paused_circuit session back to pending per tick (only when recovery:active flag set)"
    interval: 30  # 30 seconds
    priority: high
    execution_type: function
    callable: "agent.sustainability.recovery_drip"
    enabled: true

  # === Worker Hibernation (issue #839) ===

  - name: worker-health-gate
    description: "Check Anthropic circuit; renew/clear worker:hibernating flag; trigger drip resume on recovery"
    interval: 60  # 1 minute
    priority: high
    execution_type: function
    callable: "agent.hibernation.worker_health_gate"
    enabled: true

  - name: session-resume-drip
    description: "Drip one paused session back to pending per tick (only when worker:recovering flag set)"
    interval: 30  # 30 seconds
    priority: high
    execution_type: function
    callable: "agent.hibernation.session_resume_drip"
    enabled: true

  - name: sustainability-digest
    description: "Daily Telegram health summary: circuit states, throttle level, session counts, failure clusters"
    interval: 86400  # daily
    priority: low
    execution_type: agent
    command: >
      Generate and send the daily sustainability digest for the Valor AI system.
      Required output fields: (1) circuit state per dependency (anthropic, telegram, redis),
      (2) current throttle level from Redis, (3) queue paused status,
      (4) session count in last 24 hours, (5) active failure cluster count from Redis set.
      Format as a concise Telegram message (3-8 lines) and send to the 'Dev: Valor' chat.
      Subject line: Daily System Health Digest.
    enabled: true
