[project]
name = "valor-bridge"
version = "0.1.0"
description = "Telegram bridge for Valor AI"
requires-python = ">=3.11"
dependencies = [
    "telethon==1.42.0", # CRITICAL — pin exact, upgrade via /update only
    "anthropic==0.86.0", # CRITICAL — pin exact, upgrade via /update only
    "claude-agent-sdk==0.1.50", # CRITICAL — pin exact, upgrade via /update only
    "mcp>=1.8.0", # Required by claude-agent-sdk for ToolAnnotations (see issue #235)
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0",
    "requests>=2.31.0", # Required for Google API requests transport
    "ollama>=0.3.0", # Local LLM fallback for summarization
    "yt-dlp>=2024.1.0", # YouTube audio download for transcription
    "popoto>=1.0.1", # Redis ORM — agent memory primitives (editable install from ~/src/popoto)
    "google-auth-oauthlib>=1.2.0", # Google OAuth for Workspace APIs
    "google-auth-httplib2>=0.2.0", # Google Auth HTTP transport
    "google-api-python-client>=2.100.0", # Google API client
    "psutil>=5.9.0", # System resource monitoring for SDK diagnostics
    "pypdf>=6.6.2",
    "html2text>=2024.2.26", # HTML to markdown conversion for web fetch
    "numpy>=1.26.0", # Vector math for semantic doc impact finder
    "openai>=1.0.0", # Embedding API for semantic doc impact finder
    "pyyaml>=6.0.3",
    "rich>=13.0.0", # Required by pydantic logfire plugin
    "sentry-sdk>=2.0.0", # Error monitoring and performance tracing
    "fastapi>=0.115.0", # Web UI framework
    "uvicorn[standard]>=0.34.0", # ASGI server for web UI
    "jinja2>=3.1.0", # Template engine for web UI
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-xdist>=3.5.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[project.scripts]
valor-history = "tools.telegram_history.cli:main"
valor-telegram = "tools.valor_telegram:main"
valor-calendar = "tools.valor_calendar:main"
valor-image-gen = "tools.image_gen:main"
valor-selfie = "tools.selfie:main"
valor-image-analyze = "tools.image_analysis:main"
valor-search = "tools.web:cli_search"
valor-fetch = "tools.web:cli_fetch"
valor-sms-reader = "tools.sms_reader.cli:main"
valor-image-tagging = "tools.image_tagging:main"
valor-knowledge-search = "tools.knowledge_search:main"

[tool.hatch.metadata]
allow-direct-references = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["bridge", "tools", "scripts", "agent", "utils", "ui"]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".claude/worktrees"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
# -p no:postgresql: disable pytest-postgresql plugin which crashes on systems where
# psycopg/libpq is not installed (see issue #265)
addopts = "-v --tb=short -p no:postgresql"
asyncio_mode = "auto"
markers = [
    "unit: Pure logic tests, no external dependencies",
    "integration: Tests requiring Redis or network",
    "e2e: Full stack end-to-end tests",
    "slow: Long-running benchmarks and endurance tests",
    # Feature markers - use with: pytest -m <feature>
    "messaging: Telegram message reception, routing, delivery, formatting",
    "sdlc: SDLC pipeline stages, observer, steering, hooks",
    "sessions: Session lifecycle, watchdog, stall detection, recovery",
    "jobs: Job scheduling, queue, priority, health monitoring",
    "reflections: Learning system, bug detection, scheduling, reports",
    "tools: Individual tools (search, execution, analysis)",
    "config: Configuration loading, settings, project setup",
    "git: Branch management, worktrees, workspace safety",
    "validation: Commit messages, plan sections, build checks",
    "classifiers: Message classification, intake, work requests",
    "context: Context modes, session tags, enrichment",
    "monitoring: Health checks, telemetry, resource monitoring",
    "summarizer: Response summarization, coaching, message quality",
    "sdk: Claude SDK client, permissions, SDLC enforcement",
    "impact: Code and documentation impact analysis",
    "models: Redis/Popoto model relationships and persistence",
    "webui: Web UI dashboards, routes, templates",
]
