{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="container mx-auto max-w-md px-4 py-12">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold mb-2">Password Reset Complete</h1>
    <p class="text-[var(--color-text-gray)]">
      Your password has been set.
    </p>
  </div>

  <div class="card-technical p-6">
    <div class="p-4 bg-[var(--color-bg-warm-gray)] text-[var(--color-text-charcoal)] rounded-xs mb-6">
      <p>
        Your password has been successfully reset. Your account is now secure with your new password.
      </p>
    </div>

    <a href="{% url 'public:account-login' %}" class="btn-brand" style="display: block; text-align: center; text-decoration: none;">
      Log In Now
    </a>
  </div>
</div>
{% endblock %}
