<!-- Modal for adding/editing medication -->
<div class="fixed z-50 inset-0 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <!-- Background overlay -->
        <div class="fixed inset-0 bg-gray-500/75 transition-opacity" aria-hidden="true"></div>

        <!-- Center modal -->
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <div class="relative inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6 z-10">
            <div class="absolute top-0 right-0 pt-4 pr-4">
                <button
                    type="button"
                    onclick="document.getElementById('modal-container').innerHTML=''"
                    class="bg-white rounded-md text-gray-400 hover:text-gray-500 focus:outline-none"
                >
                    <span class="sr-only">Close</span>
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="sm:flex sm:items-start">
                <div class="w-full mt-3 text-center sm:mt-0 sm:text-left">
                    <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
                        {% if mode == 'edit' %}Edit{% else %}Add{% endif %} Medication
                    </h3>

                    <form
                        {% if mode == 'edit' %}
                            hx-post="{% url 'drugs:medication_edit' user_medication.pk %}"
                        {% else %}
                            hx-post="{% url 'drugs:medication_add' %}"
                        {% endif %}
                        class="mt-4 space-y-4"
                    >
                        {% csrf_token %}

                        <!-- Medication Name -->
                        <div>
                            <label for="medication_name" class="block text-sm font-medium text-gray-700">
                                Medication Name <span class="text-red-500">*</span>
                            </label>
                            <input
                                type="text"
                                id="medication_name"
                                name="medication_name"
                                required
                                placeholder="e.g., Ibuprofen, Vitamin D, Metformin"
                                value="{% if user_medication %}{{ user_medication.medication.name }}{% endif %}"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                            >
                            <p class="mt-1 text-xs text-gray-500">
                                Type the medication name. We'll add it to the database if it's new.
                            </p>
                        </div>

                        <!-- Dosage -->
                        <div>
                            <label for="dosage" class="block text-sm font-medium text-gray-700">
                                Dosage <span class="text-red-500">*</span>
                            </label>
                            <input
                                type="text"
                                id="dosage"
                                name="dosage"
                                required
                                placeholder="e.g., 10mg, 2 tablets"
                                value="{% if user_medication %}{{ user_medication.dosage }}{% endif %}"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                            >
                        </div>

                        <!-- Frequency -->
                        <div>
                            <label for="frequency" class="block text-sm font-medium text-gray-700">
                                Frequency <span class="text-red-500">*</span>
                            </label>
                            <input
                                type="text"
                                id="frequency"
                                name="frequency"
                                required
                                placeholder="e.g., once daily, twice daily"
                                value="{% if user_medication %}{{ user_medication.frequency }}{% endif %}"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                            >
                        </div>

                        <!-- Time Preference -->
                        <div>
                            <label for="time_preference" class="block text-sm font-medium text-gray-700">
                                Preferred Time
                            </label>
                            <select
                                id="time_preference"
                                name="time_preference"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                            >
                                <option value="morning" {% if user_medication and user_medication.time_preference == 'morning' %}selected{% endif %}>Morning</option>
                                <option value="evening" {% if user_medication and user_medication.time_preference == 'evening' %}selected{% endif %}>Evening</option>
                                <option value="anytime" {% if user_medication and user_medication.time_preference == 'anytime' %}selected{% endif %}>Any time</option>
                            </select>
                        </div>

                        <!-- Notes -->
                        <div>
                            <label for="notes" class="block text-sm font-medium text-gray-700">
                                Notes (optional)
                            </label>
                            <textarea
                                id="notes"
                                name="notes"
                                rows="3"
                                placeholder="Why you take it, prescribing doctor, etc."
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                            >{% if user_medication %}{{ user_medication.notes }}{% endif %}</textarea>
                        </div>

                        <!-- Form Actions -->
                        <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
                            <button
                                type="submit"
                                class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm"
                            >
                                {% if mode == 'edit' %}Update{% else %}Add{% endif %}
                            </button>
                            <button
                                type="button"
                                onclick="document.getElementById('modal-container').innerHTML=''"
                                class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:mt-0 sm:w-auto sm:text-sm"
                            >
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
