# Schema documented at https://render.com/docs/yaml-spec
previews:
  generation: manual

services:
  # Production web service
  - type: web
    name: cuttlefish
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn settings.wsgi:application --bind 0.0.0.0:$PORT --timeout 180 --keep-alive 5 --worker-connections 1000 --preload
    repo: https://github.com/tomcounsell/cuttlefish.git
    branch: main
    region: oregon
    plan: starter
    healthCheckPath: /health/
    envVars:
      - key: PORT
        value: 8000
      - key: DEPLOYMENT_TYPE
        value: PRODUCTION
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cuttlefish-keyvalue
          property: connectionString
      - fromGroup: cuttlefish

  # Background worker for Django 6.0 @task framework (django-tasks-db)
  - type: worker
    name: cuttlefish-worker
    runtime: python
    buildCommand: ./build.sh
    startCommand: python manage.py db_worker
    repo: https://github.com/tomcounsell/cuttlefish.git
    branch: main
    region: oregon
    plan: starter
    envVars:
      - key: DEPLOYMENT_TYPE
        value: PRODUCTION
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cuttlefish-keyvalue
          property: connectionString
      - fromGroup: cuttlefish

  - type: keyvalue
    name: cuttlefish-keyvalue
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow-all
    plan: free
    maxmemoryPolicy: allkeys-lru
