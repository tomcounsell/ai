<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Valor System{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230d1117'/><text x='50' y='82' font-size='80' font-family='Georgia,serif' font-weight='bold' fill='%238b949e' text-anchor='middle'>V</text></svg>">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {# Session detail modal #}
    <div id="session-modal" class="modal-overlay" onclick="if(event.target===this)closeSessionModal()">
        <div class="modal-panel">
            <button class="modal-close" onclick="closeSessionModal()" title="Close">&#10005;</button>
            <div id="session-modal-body">
                <div class="text-muted" style="padding: 24px;">Loading&hellip;</div>
            </div>
        </div>
    </div>
    <script>
    function openSessionModal() {
        document.getElementById('session-modal').classList.add('open');
    }
    function closeSessionModal() {
        document.getElementById('session-modal').classList.remove('open');
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSessionModal();
    });
    </script>
</body>
</html>
