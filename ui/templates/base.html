<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Valor System{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-brand">Valor System</a>
        <div class="nav-links">
            <a href="/reflections/" class="nav-link {% block nav_reflections %}{% endblock %}">Reflections</a>
            <a href="/sdlc/" class="nav-link {% block nav_sdlc %}{% endblock %}">SDLC</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
