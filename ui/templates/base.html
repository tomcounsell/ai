<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Valor System{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230d1117'/><text x='50' y='82' font-size='80' font-family='Georgia,serif' font-weight='bold' fill='%238b949e' text-anchor='middle'>V</text></svg>">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="health-bar" hx-get="/_partials/health/" hx-trigger="load, every 10s" hx-swap="innerHTML">
        <span class="badge badge-pending">bridge: ...</span>
        <span class="badge badge-ok">web: ok</span>
    </div>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
